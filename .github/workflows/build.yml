name: Flutter CI - Lasting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Build APK
        run: |
          # إنشاء مجلد مؤقت للمشروع
          cd /tmp
          rm -rf lasting_build
          mkdir lasting_build
          cd lasting_build
          
          # إنشاء مشروع Flutter جديد (سينشئ android تلقائياً)
          flutter create --org com.lasting --project-name lasting --platforms android .
          
          # نسخ الكود من المستودع إلى المشروع الجديد
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # إنشاء مجلدات assets
          mkdir -p assets/images assets/icons/png assets/icons/svg assets/lottie assets/fonts
          touch .env
          
          # نسخ ملفات الخطوط إذا وجدت
          if [ -d "$GITHUB_WORKSPACE/assets/fonts" ]; then
            cp -r $GITHUB_WORKSPACE/assets/fonts/* assets/fonts/ 2>/dev/null || true
          fi
          
          # تثبيت التبعيات
          flutter clean
          flutter pub get
          
          # بناء APK (Flutter سيتعامل مع android تلقائياً)
          flutter build apk --release --split-per-abi
          
          echo "=== APK Built Successfully ==="
          ls -la build/app/outputs/flutter-apk/
      
      - name: Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: lasting-apks
          path: /tmp/lasting_build/build/app/outputs/flutter-apk/*.apk
