name: Flutter CI - Lasting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Create Flutter project with Android folder
        run: |
          # إنشاء مشروع مؤقت
          cd /tmp
          rm -rf lasting_temp
          flutter create --org com.lasting --project-name lasting_temp --platforms android .
          
          # نسخ الكود من المستودع
          cp -r $GITHUB_WORKSPACE/lib lasting_temp/
          cp -r $GITHUB_WORKSPACE/assets lasting_temp/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/pubspec.yaml lasting_temp/
          
          cd lasting_temp
          
          # إنشاء المجلدات المطلوبة
          mkdir -p assets/images assets/icons/png assets/icons/svg assets/lottie
          touch .env
          
          # التحقق من وجود المجلدات
          ls -la android/
          ls -la android/app/
          
          # تحديث android/app/build.gradle
          cat > android/app/build.gradle << 'APPGRADLE'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }
          
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode', '1')
          def flutterVersionName = localProperties.getProperty('flutter.versionName', '1.0')
          
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          
          android {
              namespace "com.lasting.app"
              compileSdk 34
              ndkVersion "27.0.12077973"
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
          
              kotlinOptions {
                  jvmTarget = '17'
              }
          
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
          
              defaultConfig {
                  applicationId "com.lasting.app"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }
          
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          
          flutter {
              source '../..'
          }
          
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
              implementation 'androidx.multidex:multidex:2.0.1'
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          APPGRADLE
          
          # تحديث android/build.gradle
          cat > android/build.gradle << 'BUILDGRADLE'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          BUILDGRADLE
          
          # تحديث android/settings.gradle
          cat > android/settings.gradle << 'SETTINGS'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
          
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.3.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          
          include ":app"
          SETTINGS
          
          # إضافة الأذونات
          sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' android/app/src/main/AndroidManifest.xml
          
          # تثبيت التبعيات وبناء
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi
          
          echo "APK build completed"
          ls -la build/app/outputs/flutter-apk/
      
      - name: Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: lasting-split-apks
          path: /tmp/lasting_temp/build/app/outputs/flutter-apk/*.apk
      
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: lasting-universal-apk
          path: /tmp/lasting_temp/build/app/outputs/flutter-apk/app-release.apk
