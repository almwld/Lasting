name: Flutter CI - Lasting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Create fresh Android project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.lasting lasting_app
          mv lasting_app/android .
          rm -rf lasting_app
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Configure Android build
        run: |
          # تحديث minSdkVersion
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          # إضافة coreLibraryDesugaring
          sed -i '/android {/a\    compileOptions {\n        coreLibraryDesugaringEnabled true\n    }' android/app/build.gradle
          sed -i '/dependencies {/a\    coreLibraryDesugaring '\''com.android.tools:desugar_jdk_libs:2.0.4'\''' android/app/build.gradle
          # إضافة الأذونات
          sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' android/app/src/main/AndroidManifest.xml
      
      - name: Build Split APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi
      
      - name: Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: lasting-split-apks
          path: build/app/outputs/flutter-apk/*.apk
      
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: lasting-universal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
